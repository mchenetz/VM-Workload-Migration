{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vm-migration-estimator.secretName" . }}
  labels:
    {{- include "vm-migration-estimator.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.vmware.username }}
  VMWARE_USERNAME: {{ .Values.secrets.vmware.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.vmware.password }}
  VMWARE_PASSWORD: {{ .Values.secrets.vmware.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.openshift.token }}
  OPENSHIFT_TOKEN: {{ .Values.secrets.openshift.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.flasharray.apiToken }}
  FLASHARRAY_API_TOKEN: {{ .Values.secrets.flasharray.apiToken | b64enc | quote }}
  {{- end }}
{{- end }}
