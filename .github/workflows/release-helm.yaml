name: Release Helm Chart

on:
  push:
    tags:
      - 'helm-v*'  # Trigger on tags like helm-v0.1.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to release (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/vm-migration-estimator

  release:
    name: Package & Release
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#helm-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Chart version: $VERSION"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/vm-migration-estimator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" helm/vm-migration-estimator/Chart.yaml
          cat helm/vm-migration-estimator/Chart.yaml

      - name: Package chart
        run: |
          mkdir -p .helm-packages
          helm package helm/vm-migration-estimator -d .helm-packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helm-v${{ steps.version.outputs.version }}
          name: Helm Chart v${{ steps.version.outputs.version }}
          body: |
            ## VM Migration Estimator Helm Chart v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            helm install vm-migration oci://ghcr.io/${{ github.repository_owner }}/charts/vm-migration-estimator --version ${{ steps.version.outputs.version }}
            ```

            Or from the release asset:
            ```bash
            helm install vm-migration vm-migration-estimator-${{ steps.version.outputs.version }}.tgz
            ```
          files: .helm-packages/*.tgz
          generate_release_notes: true

  publish-oci:
    name: Publish to GHCR (OCI)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#helm-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/vm-migration-estimator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" helm/vm-migration-estimator/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package helm/vm-migration-estimator

      - name: Push to GHCR
        run: helm push vm-migration-estimator-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  publish-pages:
    name: Publish to GitHub Pages
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#helm-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" helm/vm-migration-estimator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" helm/vm-migration-estimator/Chart.yaml

      - name: Checkout gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
            git checkout main -- helm/
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
            git checkout main -- helm/
            echo "# Helm Chart Repository" > README.md
          fi

      - name: Package and index
        run: |
          helm package helm/vm-migration-estimator
          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Push gh-pages
        run: |
          git add .
          git commit -m "Release chart v${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin gh-pages
